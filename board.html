    {key:'drug',label:'마약',re:/마약|대마|필로폰|향정/},
    {key:'phishing',label:'보이스피싱',re:/보이스피싱|피싱|전기통신금융/},
    {key:'assault',label:'폭행·상해',re:/폭행|상해|협박/},
    {key:'family',label:'이혼·가사',re:/이혼|가사|상간|위자료|재산분할|양육|친권|면접교섭|혼인|파혼/},
    {key:'criminal',label:'형사',re:/형사|경찰|피의자|검찰|기소|불송치|무혐의|무고|영장|구속|절도|사기|공무집행|주거침입|횡령|배임|명예훼손|모욕/}
  ];
  function categoryOf(item){
    var hay = (item.title||'') + ' ' + ((item.tags||[]).join(' '));
    for(var i=0;i<CATS.length;i++){ if(CATS[i].re.test(hay)) return CATS[i]; }
    return {key:'etc',label:'기타'};
  }
  var activeCat = 'all';

  function buildCats(items){
    var box = document.getElementById('boardCats');
    if(!box) return;
    var counts = {};
    items.forEach(function(it){ var c = categoryOf(it).key; counts[c] = (counts[c]||0)+1; });
    var chips = '<button class="chip active" data-cat="all" type="button">전체 <b>'+items.length+'</b></button>';
    CATS.forEach(function(c){ if(counts[c.key]) chips += '<button class="chip" data-cat="'+c.key+'" type="button">'+esc(c.label)+' <b>'+counts[c.key]+'</b></button>'; });
    if(counts.etc) chips += '<button class="chip" data-cat="etc" type="button">기타 <b>'+counts.etc+'</b></button>';
    box.innerHTML = chips;
    activeCat = 'all';
    Array.prototype.slice.call(box.querySelectorAll('.chip')).forEach(function(chip){
      chip.addEventListener('click', function(){
        Array.prototype.slice.call(box.querySelectorAll('.chip')).forEach(function(o){ o.classList.remove('active'); });
        chip.classList.add('active');
        activeCat = chip.getAttribute('data-cat');
        applyFilters();
      });
    });
  }

  function applyFilters(){
    var el = document.getElementById('boardSearch');
    var q = (el ? el.value : '').trim().toLowerCase();
    var rows = Array.prototype.slice.call(list.querySelectorAll('.row')).filter(function(r){ return !r.classList.contains('head'); });
    var shown = 0;
    rows.forEach(function(r){
      var cat = r.getAttribute('data-cat') || '';
      var text = (r.getAttribute('data-text') || '').toLowerCase();
      var show = (activeCat==='all' || cat===activeCat) && (!q || text.indexOf(q)!==-1);
      r.style.display = show ? '' : 'none';
      if(show) shown++;
    });
    count.textContent = '총 '+shown+'건';
    var emptyEl = document.getElementById('boardEmpty');
    if(emptyEl) emptyEl.style.display = shown ? 'none' : 'block';
  }

  function loadLawPosts(callback){
    fetch('/blog/posts.json?v=' + Date.now())
      .then(function(r){ return r.json(); })
      .then(function(posts){
        var items = posts.map(function(p){
          return {
            title: p.title,
            date: p.date,
            source: '위드윤 법률칼럼',
            blogUrl: '/blog/' + p.slug + '.html',
            content: p.summary,
            tags: p.tags || [],
            _seed: true
          };
        });
        callback(items);
      })
      .catch(function(){ callback([]); });
  }

  function loadCasePosts(callback){
    fetch('/blog/cases.json?v=' + Date.now())
      .then(function(r){ return r.json(); })
      .then(function(posts){
        var items = posts.map(function(p){
          return {
            title: p.title,
            date: p.date,
            source: '위드윤 성공사례',
            blogUrl: '/blog/' + p.slug + '.html',
            content: p.summary,
            tags: p.tags || [],
            _seed: true
          };
        });
        callback(items);
      })
      .catch(function(){ callback([]); });
  }
  function detailUrl(type, item){
    if(item.blogUrl) return item.blogUrl;
    var p = new URLSearchParams({
      type:type, id:item.id||'', title:item.title||'', date:item.date||'',
      content:item.content||'', is_html:item.is_html?'1':'0',
      source:item.source||'', externalUrl:item.external_url||item.externalUrl||''
    });
    return 'board_detail.html?'+p.toString();
  }

  function render(seeds, apiItems){
    var titleMap = {case:'성공사례', law:'법률칼럼', press:'언론'};
    document.getElementById('boardTitle').textContent = titleMap[current]||'칼럼';
    tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.type===current); });
    formTitle.textContent = labels[current]+' 글쓰기';
    var all = (seeds||[]).concat(apiItems||[]);
    count.textContent = '총 '+all.length+'건';
    if(!all.length){
      list.innerHTML = '<div class="row head"><div class="cell">번호</div><div class="cell">제목</div><div class="cell date">작성일</div></div><div class="empty">등록된 게시글이 없습니다.</div>';
      return;
    }
    var html = '<div class="row head"><div class="cell">번호</div><div class="cell">제목</div><div class="cell date">작성일</div></div>';
    all.slice().reverse().forEach(function(item, i){
      var url = detailUrl(current, item);
      var cat = categoryOf(item);
      html += '<a class="row" data-cat="'+cat.key+'" data-text="'+esc((item.title||'')+' '+((item.tags||[]).join(' ')))+'" target="_blank" rel="noopener" href="'+esc(url)+'">'
        +'<div class="cell">'+(all.length-i)+'</div>'
        +'<div class="cell title">'+esc(item.title)
        +(item.source?'<span class="source">'+esc(item.source)+'</span>':'')
        +(!item._seed&&item.id?' <button class="del" onclick="event.preventDefault();event.stopPropagation();wyDelete('+item.id+')">삭제</button>':'')
        +'</div>'
        +'<div class="cell date">'+esc(item.date)+'</div>'
        +'</a>';
    });
    list.innerHTML = html;
    buildCats(all);
    applyFilters();
  }

  function load(){
    list.innerHTML = '<div class="empty">불러오는 중...</div>';

    if(current === 'law'){
      var lawSeeds = [];
      var apiDone = false, seedDone = false;
      var apiItems = [];

      loadLawPosts(function(items){
        lawSeeds = items;
        seedDone = true;
        if(apiDone) render(lawSeeds, apiItems);
      });
      fetch(API+'/api/posts?type=law')
        .then(function(r){ return r.json(); })
        .then(function(data){ apiItems = Array.isArray(data)?data:[]; apiDone=true; if(seedDone) render(lawSeeds, apiItems); })
        .catch(function(){ apiDone=true; if(seedDone) render(lawSeeds, []); });

    } else if(current === 'press'){
      render(pressData, []);

    } else {
      var caseSeeds = [];
      var caseApiDone = false, caseSeedDone = false;
      var caseApiItems = [];

      loadCasePosts(function(items){
        caseSeeds = items;
        caseSeedDone = true;
        if(caseApiDone) render(caseSeeds, caseApiItems);
      });
      fetch(API+'/api/posts?type='+current)
        .then(function(r){ return r.json(); })
        .then(function(data){ caseApiItems = Array.isArray(data)?data:[]; caseApiDone=true; if(caseSeedDone) render(caseSeeds, caseApiItems); })
        .catch(function(){ caseApiDone=true; if(caseSeedDone) render(caseSeeds, []); });
    }
  }

  tabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      current = tab.dataset.type;
      history.replaceState(null,'','?type='+current);
      form.classList.remove('open');
      var s = document.getElementById('boardSearch');
      if(s) s.value = '';
      load();
    });
  });

  var searchEl = document.getElementById('boardSearch');
  if(searchEl) searchEl.addEventListener('input', applyFilters);

  document.getElementById('writeBtn').addEventListener('click', function(){
    titleInput.value = '';
    if(window._quill) window._quill.setText('');
    form.classList.add('open');
    titleInput.focus();
  });
  document.getElementById('cancelBtn').addEventListener('click', function(){
    form.classList.remove('open');
  });
  form.addEventListener('submit', function(e){
    e.preventDefault();
    var title = titleInput.value.trim();
    var html2 = window._quill?window._quill.root.innerHTML.trim():'';
    var text = window._quill?window._quill.getText().trim():'';
    if(!title){alert('제목을 입력하세요.');titleInput.focus();return;}
    if(!text){alert('내용을 입력하세요.');return;}
    fetch(API+'/api/posts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:current,title:title,content:html2,is_html:true,date:today()})
    }).then(function(r){return r.json();})
      .then(function(){form.classList.remove('open');load();})
      .catch(function(){alert('저장 실패. 다시 시도해주세요.');});
  });
  window.wyDelete = function(id){
    if(!confirm('이 글을 삭제하시겠습니까?')) return;
    fetch(API+'/api/posts/'+id,{method:'DELETE'})
      .then(function(){load();})
      .catch(function(){alert('삭제 실패.');});
  };

  window._quill = new Quill('#editor',{
    theme:'snow',
    placeholder:'내용을 입력하세요.',
    modules:{toolbar:[[{header:[2,3,false]}],['bold','italic','underline'],[{color:[]},{background:[]}],[{list:'ordered'},{list:'bullet'}],[{align:[]}],['blockquote'],['clean']]}
  });
  window._quill.on('text-change',function(){
    var len = window._quill.getText().replace(/\n/g,'').length;
    document.getElementById('charCount').textContent = len.toLocaleString()+'자';
  });

  load();
})();
</script>
</body>
</html>
