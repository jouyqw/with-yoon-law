.meta strong{color:var(--mid);}

.source-link:hover{border-color:var(--gold);}
.body{padding:46px 48px 56px;font-size:17px;color:#2f3744;font-weight:300;line-height:2.05;word-break:keep-all;overflow-wrap:break-word;}
.body p{margin:0 0 22px;}
.body p:last-child{margin-bottom:0;}
.blank{height:10px;}

.cta-links{display:flex;gap:8px;flex-wrap:wrap;}
.gold{background:var(--gold);color:#111;border-color:var(--gold);}
.naver{background:var(--green);color:#fff;border-color:var(--green);}
.related{margin-top:22px;background:#fff;border:1px solid var(--line);padding:24px 28px;}

.related a{display:flex;justify-content:space-between;gap:14px;padding:12px 0;border-top:1px solid #f0f2f5;color:var(--mid);font-size:14px;}

.error{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);text-align:center;padding:78px 22px;}

<script>
(function(){
  // ── 전체 seedData (board.html 과 동일하게 유지) ─────────
  var seedData = {
    case: [
      {title:'성범죄 혐의 무혐의 처분 – 허위 고소 대응 성공사례', date:'2025.11', source:'법률사무소 위드윤', content:'지인으로부터 성추행 고소를 당한 의뢰인 사건에서, 당시 CCTV 영상·메신저 기록·목격자 진술을 종합하여 혐의 없음 처분을 받은 사례입니다.\n\n사건 초기 진술 방향 설정과 증거 수집 전략이 결과를 좌우했습니다. 법률사무소 위드윤은 의뢰인의 억울한 누명을 벗기 위해 수사 단계부터 밀착 조력했습니다.'},
      {title:'이혼 소송 – 재산분할 60% 확보 성공사례', date:'2025.08', source:'법률사무소 위드윤', content:'혼인 기간 중 전업주부로 생활한 의뢰인이 이혼 소송에서 재산분할 60% 인정을 받은 사례입니다.\n\n배우자 명의로 된 부동산·금융자산에 대해 기여도를 구체적으로 입증하고, 감정 절차를 통해 자산가치를 정확히 산정하여 유리한 결과를 이끌었습니다.'},
      {title:'폭행 혐의 불기소 – 정당방위 인정 사례', date:'2025.06', source:'법률사무소 위드윤', content:'편의점에서 시비가 붙어 폭행 혐의로 입건된 의뢰인 사건에서, CCTV 분석과 목격자 진술로 정당방위를 주장하여 혐의없음 처분을 받은 사례입니다.\n\n상대방의 선제 공격과 의뢰인의 방어 행위를 명확히 구분해 검사에게 설득력 있게 전달한 것이 핵심이었습니다.'},
      {title:'스토킹 고소 – 접근금지 가처분 및 형사처벌 성공사례', date:'2025.03', source:'법률사무소 위드윤', content:'전 연인으로부터 지속적인 연락·미행을 당한 의뢰인을 대리하여, 스토킹처벌법 위반 고소 및 접근금지 가처분을 신속히 확보한 사례입니다.'},
      {title:'보이스피싱 피해자 – 피의자 신분 전환 방어 성공사례', date:'2024.12', source:'법률사무소 위드윤', content:'보이스피싱 조직에 속아 계좌를 빌려준 의뢰인이 피의자로 입건된 사건에서, 기망 경위와 미필적 고의 부재를 집중 소명하여 불기소 처분을 이끈 사례입니다.'}
    ],
    law: [
      {title:'고소장을 취하하지 않고 보완해야 하는 이유', date:'2026.05.31', source:'위드윤 법률칼럼', content:'고소장 내용이 부족하다고 느껴질 때 곧바로 취하 후 재고소를 선택하는 것은 위험할 수 있습니다.\n\n친고죄나 반의사불벌죄는 고소 취소 후 다시 고소하는 데 제한이 생길 수 있고, 비친고죄라도 수사 실무상 재고소가 제약될 수 있습니다.\n\n기존 사건을 유지한 채 추가고소장, 보충 의견서, 증거자료를 제출하는 방식이 더 안전한 대응이 될 수 있습니다.\n\n법률사무소 위드윤은 형사 고소 단계에서 사실관계 정리, 증거 구성, 의견서 작성 방향을 사건별로 검토합니다.'},
      {title:'스토킹처벌법, 반복성이 없어도 처벌될 수 있다', date:'2026.04', source:'위드윤 법률칼럼', content:'2023년 개정 스토킹처벌법은 \"지속적 또는 반복적\" 요건에서 \"지속적이거나 반복적\" 요건으로 변경되어, 단 1회 행위로도 처벌 가능성이 생겼습니다.\n\n메시지 발송, 주거지 출현, SNS DM 등 다양한 행위가 스토킹에 해당할 수 있으며, 피해자는 신속히 고소장을 접수하고 접근금지 신청을 병행하는 것이 중요합니다.'},
      {title:'이혼 재산분할, 전업주부 기여도 어떻게 인정받나?', date:'2026.02', source:'위드윤 법률칼럼', content:'법원은 재산분할 시 직접적인 금전 기여 외에 가사노동, 자녀 양육, 배우자 경제활동 지원 등 간접 기여도를 종합적으로 평가합니다.'},
      {title:'정당방위와 과잉방위, 어떻게 다른가?', date:'2025.12', source:'위드윤 법률칼럼', content:'형법상 정당방위가 인정되려면 현재의 부당한 침해, 자기 또는 타인의 법익 보호, 상당한 이유가 요건입니다.'}
    ],
    press: [
      {title:'경찰서에 제출한 고소장이 너무 부실해서 취하 후 재고소하고 싶은데, 가능한가?', date:'2023.05.12', source:'로톡뉴스', externalUrl:'https://lawtalknews.co.kr/article/GFSYPWTF74A9'},
      {title:'10년 전에 도난당한 중고차…무단 방치로 경찰 출석요구서 받아', date:'2023.06.01', source:'로톡뉴스', externalUrl:'https://lawtalknews.co.kr/article/05ZLYD68RRFU'},
      {title:'CCTV가 본 진실, 지하철 폭행 누명 벗었지만…', date:'2026.03.12', source:'로톡뉴스', externalUrl:'https://lawtalknews.co.kr/article/PYI29IY6C8SN'}
    ]
  };

  var labels = { case:'성공사례', law:'법률칼럼', press:'언론' };
  var params = new URLSearchParams(location.search);
  var type   = params.get('type') || '';
  var listUrl = 'board.html' + (labels[type] ? '?type=' + encodeURIComponent(type) : '');
  document.getElementById('listTop').href = listUrl;

  // 동적 영역 활성화
  document.getElementById('dynamicContent').style.display = 'block';

  var post = getPost();
  if(!post || !post.title){ renderError(listUrl); return; }

  type = post.type || type;
  var label = post.typeLabel || labels[type] || '게시글';

  // ── 메타 태그 동적 업데이트 ─────────────────────────────
  var description = String(post.content || '').replace(/\s+/g,' ').trim().slice(0,150) || '법률사무소 위드윤 게시글입니다.';
  document.title = post.title + ' | 법률사무소 위드윤';
  setMeta('name','description', description);
  setMeta('property','og:title', post.title + ' | 법률사무소 위드윤');
  setMeta('property','og:description', description);

  injectArticleSeo(post, label);
  renderArticle({type:type, label:label, title:post.title, date:post.date||'', content:post.content||'', source:post.source||'', externalUrl:post.externalUrl||''}, listUrl);

  // ── 게시글 데이터 획득 ───────────────────────────────────
  function getPost(){
    // 1) postKey (구버전 localStorage 방식 호환)
    var postKey = params.get('postKey');
    if(postKey){
      try{
        var s = JSON.parse(localStorage.getItem(postKey)||'null');
        if(s && s.title) return s;
      }catch(e){}
    }
    // 2) seedData에서 직접 조회 (가장 신뢰성 높음)
    var idx = params.get('idx');
    if(type && idx !== null && !isNaN(Number(idx))){
      var seeds = seedData[type] || [];
      var item = seeds[Number(idx)];
      if(item) return Object.assign({}, item, {type:type, typeLabel:labels[type]});
    }
    // 3) localStorage 저장 글
    if(type && idx !== null){
      try{
        var stored = JSON.parse(localStorage.getItem('wyBoard_'+type)||'[]');
        var si = stored[Number(idx)];
        if(si) return Object.assign({}, si, {type:type, typeLabel:labels[type]});
      }catch(e){}
    }
    // 4) URL 파라미터 직접 (fallback)
    var title = params.get('title');
    if(title){
      return {
        type: type,
        typeLabel: labels[type] || '게시글',
        title: title,
        date: params.get('date') || '',
        content: params.get('content') || '',
        source: params.get('source') || '',
        externalUrl: params.get('externalUrl') || ''
      };
    }
    return null;
  }

  function esc(s){
    return String(s||'').replace(/[&<>"']/g,function(c){
      return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function bodyHtml(content){
    var text = String(content||'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    if(!text.trim()) return '<p>내용이 없습니다.</p>';
    return text.split('\n').map(function(line){
      return line.trim() ? '<p>'+esc(line)+'</p>' : '<div class="blank" aria-hidden="true"></div>';
    }).join('');
  }
  function setMeta(attr, name, value){
    var el = document.querySelector('meta['+attr+'="'+name+'"]');
    if(!el){ el = document.createElement('meta'); el.setAttribute(attr, name); document.head.appendChild(el); }
    el.setAttribute('content', value);
  }
  function injectArticleSeo(post, label){
    var schema = document.createElement('script');
    schema.type = 'application/ld+json';
    schema.textContent = JSON.stringify({
      '@context':'https://schema.org',
      '@type':'Article',
      headline: post.title,
      description: String(post.content||'').replace(/\s+/g,' ').trim().slice(0,150),
      articleSection: label,
      author: {'@type':'Organization', name:'법률사무소 위드윤'},
      publisher: {
        '@type':'LegalService',
        name:'법률사무소 위드윤',
        telephone:'010-9491-1567',
        areaServed:'서울 서초구',
        url:'https://withyoonlaw.pages.dev'
      },
      datePublished: post.date || undefined,
      mainEntityOfPage: location.href,
      sameAs: post.externalUrl ? [post.externalUrl] : undefined
    });
    document.head.appendChild(schema);
  }
  function renderArticle(post, listUrl){
    var catClass = post.type==='press'?'press':post.type==='case'?'case':'';
    document.getElementById('dynamicContent').innerHTML =
      '<nav class="crumb" aria-label="현재 위치"><a href="index.html#top">홈</a><span>&gt;</span><a href="'+listUrl+'">칼럼</a><span>&gt;</span><span>'+esc(post.label)+'</span></nav>'
      +'<article class="article">'
      +'<header class="head"><div class="cat '+catClass+'">'+esc(post.label)+'</div><h1>'+esc(post.title)+'</h1>'
      +'<div class="meta"><span><strong>작성자</strong> 법률사무소 위드윤</span>'+(post.date?'<span><strong>작성일</strong> '+esc(post.date)+'</span>':'')+(post.source?'<span><strong>출처</strong> '+esc(post.source)+'</span>':'')+'</div>'
      +(post.externalUrl?'<a class="source-link" href="'+esc(post.externalUrl)+'" target="_blank" rel="noopener">원문 기사 보기 →</a>':'')
      +'</header>'
      +'<div class="body">'+bodyHtml(post.content)+'</div>'
      +'<section class="cta"><div><h2>법률 상담이 필요하신가요?</h2><p>대표 변호사가 사건 방향을 직접 확인합니다.</p></div>'
      +'<div class="cta-links"><a class="btn gold" href="tel:010-9491-1567">전화 상담</a><a class="btn naver" href="https://map.naver.com/p/entry/place/1750217153" target="_blank" rel="noopener">N 네이버 예약</a></div></section>'
      +'</article>'
      +'<section class="related"><h2>바로가기</h2><a href="'+listUrl+'"><span>'+esc(post.label)+' 목록</span><span>보기</span></a><a href="index.html#contact"><span>상담 안내 및 오시는 길</span><span>확인</span></a></section>';
  }
  function renderError(listUrl){
    document.getElementById('dynamicContent').innerHTML =
      '<div class="error"><h1>게시글을 찾을 수 없습니다</h1><p>주소가 올바르지 않거나 게시글이 삭제되었습니다.</p><a class="btn primary" href="'+listUrl+'">목록으로 돌아가기</a></div>';
  }
})();
</script>
