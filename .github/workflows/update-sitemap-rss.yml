name: Update sitemap and RSS

on:
  push:
    branches:
      - main
    paths:
      - "blog/**/*.html"
      - "blog/posts.json"
      - "blog/cases.json"
      - "board.html"
      - "index.html"
      - "robots.txt"
      - ".github/workflows/update-sitemap-rss.yml"
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate sitemap, RSS, and robots
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const site = 'https://with-yoon-law.com';
          const today = new Date().toISOString().slice(0, 10);

          const escapeXml = (value = '') => String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');

          const stripHtml = (value = '') => String(value)
            .replace(/<script[\s\S]*?<\/script>/gi, ' ')
            .replace(/<style[\s\S]*?<\/style>/gi, ' ')
            .replace(/<[^>]+>/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

          const read = (file) => fs.readFileSync(file, 'utf8').replace(/^\uFEFF/, '');
          const match = (html, regex) => (html.match(regex) || [])[1]?.trim() || '';

          function readPostsJson() {
            const file = path.join('blog', 'posts.json');
            if (!fs.existsSync(file)) return [];
            try {
              return JSON.parse(read(file));
            } catch (error) {
              console.warn(`Could not parse ${file}: ${error.message}`);
              return [];
            }
          }

          const postsJson = new Map(readPostsJson().map((post) => [post.slug, post]));
          const blogDir = 'blog';
          const blogFiles = fs.existsSync(blogDir)
            ? fs.readdirSync(blogDir).filter((file) => file.endsWith('.html')).sort()
            : [];

          const posts = blogFiles.map((file) => {
            const fullPath = path.join(blogDir, file);
            const html = read(fullPath);
            const slug = file.replace(/\.html$/, '');
            const fromJson = postsJson.get(slug) || {};
            const url = `${site}/blog/${slug}`;
            const title = fromJson.title
              || match(html, /<title>([\s\S]*?)<\/title>/i).replace(/\s*\|\s*법률사무소[\s\S]*$/i, '')
              || stripHtml(match(html, /<h1[^>]*>([\s\S]*?)<\/h1>/i))
              || slug;
            const description = fromJson.summary
              || match(html, /<meta\s+name=["']description["']\s+content=["']([^"']+)["']/i)
              || stripHtml(match(html, /<article[^>]*>([\s\S]*?)<\/article>/i)).slice(0, 180);
            const date = (fromJson.date || '').replace(/\./g, '-').replace(/-$/g, '')
              || match(html, /"datePublished"\s*:\s*"([^"]+)"/i)
              || match(html, /<time[^>]*datetime=["']([^"']+)["']/i)
              || today;

            return { file, slug, url, title, description, date };
          }).sort((a, b) => b.date.localeCompare(a.date) || a.file.localeCompare(b.file));

          const staticUrls = [
            { loc: `${site}/`, changefreq: 'weekly', priority: '1.0', lastmod: today },
            { loc: `${site}/board?type=law`, changefreq: 'daily', priority: '0.9', lastmod: today },
            { loc: `${site}/board?type=case`, changefreq: 'daily', priority: '0.8', lastmod: today },
            { loc: `${site}/board?type=press`, changefreq: 'weekly', priority: '0.6', lastmod: today }
          ];

          const sitemapUrls = [
            ...staticUrls,
            ...posts.map((post) => ({
              loc: post.url,
              changefreq: 'monthly',
              priority: '0.9',
              lastmod: post.date
            }))
          ];

          const sitemapItems = sitemapUrls.map((item) => [
            '  <url>',
            `    <loc>${escapeXml(item.loc)}</loc>`,
            `    <lastmod>${escapeXml(item.lastmod)}</lastmod>`,
            `    <changefreq>${item.changefreq}</changefreq>`,
            `    <priority>${item.priority}</priority>`,
            '  </url>'
          ].join('\n')).join('\n');

          const sitemap = [
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">',
            sitemapItems,
            '</urlset>',
            ''
          ].join('\n');

          const rssPosts = posts.slice(0, 50).map((post) => [
            '    <item>',
            `      <title>${escapeXml(post.title)}</title>`,
            `      <link>${escapeXml(post.url)}</link>`,
            `      <guid isPermaLink="true">${escapeXml(post.url)}</guid>`,
            `      <description>${escapeXml(post.description)}</description>`,
            `      <pubDate>${new Date(`${post.date}T00:00:00+09:00`).toUTCString()}</pubDate>`,
            '    </item>'
          ].join('\n')).join('\n');

          const rss = [
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<rss version="2.0" xmlns:atom="http://www.w3.org/2005/Atom">',
            '  <channel>',
            '    <title>법률사무소 위드윤 법률칼럼</title>',
            `    <link>${site}/board?type=law</link>`,
            '    <description>법률사무소 위드윤의 형사·성범죄 법률칼럼과 성공사례</description>',
            '    <language>ko-KR</language>',
            `    <lastBuildDate>${new Date().toUTCString()}</lastBuildDate>`,
            `    <atom:link href="${site}/rss.xml" rel="self" type="application/rss+xml" />`,
            rssPosts,
            '  </channel>',
            '</rss>',
            ''
          ].join('\n');

          const robots = [
            'User-agent: *',
            'Allow: /',
            '',
            'User-agent: Yeti',
            'Allow: /',
            '',
            'User-agent: Googlebot',
            'Allow: /',
            '',
            `Sitemap: ${site}/sitemap.xml`,
            `Sitemap: ${site}/rss.xml`,
            ''
          ].join('\n');

          fs.writeFileSync('sitemap.xml', sitemap);
          fs.writeFileSync('rss.xml', rss);
          fs.writeFileSync('robots.txt', robots);
          console.log(`Generated sitemap.xml with ${sitemapUrls.length} URLs`);
          console.log(`Generated rss.xml with ${Math.min(posts.length, 50)} items`);
          console.log('Generated robots.txt');
          NODE

      - name: Commit generated files
        run: |
          if git diff --quiet -- sitemap.xml rss.xml robots.txt; then
            echo "No sitemap, RSS, or robots changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml rss.xml robots.txt
          git commit -m "Update sitemap, RSS, and robots"
          git push
