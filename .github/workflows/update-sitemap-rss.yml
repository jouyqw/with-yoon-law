name: Update sitemap and RSS

on:
  push:
    branches:
      - main
    paths:
      - "blog/**/*.html"
      - "index.html"
      - ".github/workflows/update-sitemap-rss.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate sitemap and RSS
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const site = 'https://with-yoon-law.com';
          const today = new Date().toISOString().slice(0, 10);

          const escapeXml = (value = '') => String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');

          const stripHtml = (value = '') => String(value)
            .replace(/<script[\s\S]*?<\/script>/gi, ' ')
            .replace(/<style[\s\S]*?<\/style>/gi, ' ')
            .replace(/<[^>]+>/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

          const read = (file) => fs.readFileSync(file, 'utf8');
          const match = (html, regex) => (html.match(regex) || [])[1]?.trim() || '';

          const blogDir = 'blog';
          const blogFiles = fs.existsSync(blogDir)
            ? fs.readdirSync(blogDir).filter((file) => file.endsWith('.html')).sort()
            : [];

          const posts = blogFiles.map((file) => {
            const fullPath = path.join(blogDir, file);
            const html = read(fullPath);
            const slug = file.replace(/\.html$/, '');
            const url = `${site}/blog/${slug}`;
            const title = match(html, /<title>([\s\S]*?)<\/title>/i)
              .replace(/\s*\|\s*법률사무소[\s\S]*$/i, '')
              || match(html, /<h1[^>]*>([\s\S]*?)<\/h1>/i)
              || slug;
            const description = match(html, /<meta\s+name=["']description["']\s+content=["']([^"']+)["']/i)
              || stripHtml(match(html, /<article[^>]*>([\s\S]*?)<\/article>/i)).slice(0, 180);
            const date = match(html, /"datePublished"\s*:\s*"([^"]+)"/i)
              || match(html, /<time[^>]*datetime=["']([^"']+)["']/i)
              || today;

            return { file, url, title, description, date };
          }).sort((a, b) => b.date.localeCompare(a.date) || a.file.localeCompare(b.file));

          const sitemapUrls = [
            { loc: `${site}/`, changefreq: 'weekly', priority: '1.0', lastmod: today },
            { loc: `${site}/board?type=law`, changefreq: 'weekly', priority: '0.8', lastmod: today },
            ...posts.map((post) => ({
              loc: post.url,
              changefreq: 'monthly',
              priority: '0.9',
              lastmod: post.date
            }))
          ];

          const sitemapItems = sitemapUrls.map((item) => [
            '  <url>',
            `    <loc>${escapeXml(item.loc)}</loc>`,
            `    <lastmod>${escapeXml(item.lastmod)}</lastmod>`,
            `    <changefreq>${item.changefreq}</changefreq>`,
            `    <priority>${item.priority}</priority>`,
            '  </url>'
          ].join('\n')).join('\n');

          const sitemap = [
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">',
            sitemapItems,
            '</urlset>',
            ''
          ].join('\n');

          const rssPosts = posts.slice(0, 30).map((post) => [
            '    <item>',
            `      <title>${escapeXml(post.title)}</title>`,
            `      <link>${escapeXml(post.url)}</link>`,
            `      <guid isPermaLink="true">${escapeXml(post.url)}</guid>`,
            `      <description>${escapeXml(post.description)}</description>`,
            `      <pubDate>${new Date(`${post.date}T00:00:00+09:00`).toUTCString()}</pubDate>`,
            '    </item>'
          ].join('\n')).join('\n');

          const rss = [
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<rss version="2.0">',
            '  <channel>',
            '    <title>법률사무소 위드윤 칼럼</title>',
            `    <link>${site}/board?type=law</link>`,
            '    <description>법률사무소 위드윤의 법률 칼럼과 형사 사건 대응 정보</description>',
            '    <language>ko</language>',
            `    <lastBuildDate>${new Date().toUTCString()}</lastBuildDate>`,
            rssPosts,
            '  </channel>',
            '</rss>',
            ''
          ].join('\n');

          fs.writeFileSync('sitemap.xml', sitemap);
          fs.writeFileSync('rss.xml', rss);
          console.log(`Generated sitemap.xml with ${sitemapUrls.length} URLs`);
          console.log(`Generated rss.xml with ${Math.min(posts.length, 30)} items`);
          NODE

      - name: Commit generated files
        run: |
          if git diff --quiet -- sitemap.xml rss.xml; then
            echo "No sitemap or RSS changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml rss.xml
          git commit -m "Update sitemap and RSS"
          git push
